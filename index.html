<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow, noarchive" />
  <meta name="googlebot" content="noindex, nofollow, noarchive" />
  <title>GSC Reports</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0d0d0d;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
    }

    header {
      margin-bottom: 3rem;
      text-align: center;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    h1 span {
      color: #555;
      font-weight: 400;
    }

    .sites {
      display: flex;
      flex-direction: column;
      gap: 2.5rem;
      width: 100%;
      max-width: 400px;
    }

    .site h2 {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #555;
      margin-bottom: 0.75rem;
    }

    .reports {
      display: flex;
      flex-direction: column;
      gap: 0.375rem;
    }

    .reports a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.625rem 0.875rem;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      text-decoration: none;
      color: #e0e0e0;
      font-size: 0.875rem;
      transition: border-color 0.15s, background 0.15s;
    }

    .reports a:hover {
      border-color: #444;
      background: #212121;
    }

    .reports a .date {
      font-variant-numeric: tabular-nums;
    }

    .reports a .arrow {
      color: #444;
      font-size: 0.8rem;
      transition: color 0.15s;
    }

    .reports a:hover .arrow {
      color: #888;
    }
  </style>
</head>
<body>

  <header>
    <h1>GSC Reports <span>/ lighthouse</span></h1>
  </header>

  <div class="sites">

    <div class="site">
      <h2>La Vanguardia</h2>
      <div class="reports">
        <a href="lv/17042025/">
          <span class="date">17 / 04 / 2025</span>
          <span class="arrow">→</span>
        </a>
      </div>
    </div>

    <div class="site">
      <h2>Mundo Deportivo</h2>
      <div class="reports">
        <a href="md/17042025/">
          <span class="date">17 / 04 / 2025</span>
          <span class="arrow">→</span>
        </a>
      </div>
    </div>

  </div>

</body>
</html>
